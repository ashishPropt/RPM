name: Auto FTP Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # needed for changed-file detection

      - name: Upload to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./
          protocol: ftp        # GoDaddy shared hosting: use 'ftp'; change to 'ftps' if your plan supports it
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            workflows/**
            .github/**
